<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EngLand CRM</title>
<style>
  :root {
    --navy: #1E2D4E;
    --navy-light: #2A3D63;
    --red: #E63030;
    --blue: #1282CA;
    --bg: #F5F6FA;
    --white: #FFFFFF;
    --border: #E8EAF0;
    --text-primary: #1A1A1A;
    --text-secondary: #5A6478;
    --text-muted: #9BA8BF;
    --success: #1A7A40;
    --success-bg: #E8F8EC;
    --warning: #B5841A;
    --warning-bg: #FFF6E0;
    --danger: #C0392B;
    --danger-bg: #FFF0F0;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-tap-highlight-color: transparent;
  }
  input, select, textarea, button { font-family: inherit; font-size: 15px; }

  /* ===== LOGIN SCREEN ===== */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy);
    padding: 20px;
  }
  .login-box {
    background: var(--white);
    border-radius: 16px;
    padding: 36px 28px;
    width: 100%;
    max-width: 380px;
  }
  .login-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .login-logo-text { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .login-logo-text .e { color: var(--navy); }
  .login-logo-text .l { color: var(--red); }
  .login-title { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: border-color .15s;
  }
  .form-input:focus { border-color: var(--blue); }
  .btn-primary {
    width: 100%;
    background: var(--red);
    color: white;
    border: none;
    padding: 13px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-primary:active { opacity: 0.85; }
  .login-error {
    background: var(--danger-bg);
    color: var(--danger);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
  .login-hint {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .login-hint b { color: var(--text-secondary); }

  /* ===== APP SHELL ===== */
  #app { display: none; min-height: 100vh; padding-bottom: 70px; }
  .topbar {
    background: var(--navy);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-logo { font-size: 16px; font-weight: 700; }
  .topbar-logo .l { color: #FF6B6B; }
  .topbar-role { font-size: 11px; opacity: 0.6; }
  .topbar-user { font-size: 13px; display: flex; align-items: center; gap: 10px; }
  .logout-btn {
    background: rgba(255,255,255,0.12);
    color: white;
    border: none;
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .page { padding: 16px; max-width: 720px; margin: 0 auto; }
  .page-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    margin-bottom: 12px;
  }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 14px; border: 1px solid var(--border); }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--navy); }
  .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-muted); margin: 20px 0 10px;
  }
  .section-label:first-child { margin-top: 0; }

  .list-item {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .list-item:active { background: var(--bg); }
  .list-item-main { flex: 1; min-width: 0; }
  .list-item-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .list-item-sub { font-size: 12px; color: var(--text-secondary); }
  .list-item-right { text-align: right; flex-shrink: 0; margin-left: 10px; }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: var(--success-bg); color: var(--success); }
  .badge-warn { background: var(--warning-bg); color: var(--warning); }
  .badge-danger { background: var(--danger-bg); color: var(--danger); }
  .badge-navy { background: #EEF2FF; color: var(--navy); }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1;
    text-align: center;
    padding: 10px 4px 8px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 10px;
    border: none;
    background: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .nav-item.active { color: var(--red); }
  .nav-icon { font-size: 20px; line-height: 1; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state-icon { font-size: 36px; margin-bottom: 10px; }

  .back-btn {
    background: none; border: none; color: var(--navy); font-size: 14px;
    font-weight: 600; cursor: pointer; margin-bottom: 14px; display: flex;
    align-items: center; gap: 4px; padding: 4px 0;
  }

  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--navy); color: white;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
  .detail-name { font-size: 18px; font-weight: 700; }
  .detail-sub { font-size: 13px; color: var(--text-secondary); }

  .progress-bar-track { background: var(--border); border-radius: 20px; height: 8px; overflow: hidden; margin: 6px 0; }
  .progress-bar-fill { height: 100%; background: var(--blue); border-radius: 20px; }

  .row-between { display: flex; justify-content: space-between; align-items: center; }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }

  .tab-row { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; }
  .tab-btn {
    padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: white; font-size: 13px; font-weight: 600; color: var(--text-secondary);
    cursor: pointer; white-space: nowrap;
  }
  .tab-btn.active { background: var(--navy); color: white; border-color: var(--navy); }

  textarea.form-input { resize: vertical; min-height: 70px; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: white; border-radius: 16px 16px 0 0; padding: 20px;
    width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-secondary {
    flex: 1; background: var(--bg); color: var(--text-primary); border: none;
    padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .btn-primary.flex { flex: 1; margin-top: 0; }

  .toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: white; padding: 10px 18px; border-radius: 8px;
    font-size: 13px; z-index: 200; display: none;
  }

  .loading-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 14px;
  }

  select.form-input { appearance: none; background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" stroke="%235A6478" stroke-width="1.5" fill="none"/></svg>') no-repeat right 14px center; }

  .lesson-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .lesson-row:last-child { border-bottom: none; }
  .check-circle {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; cursor: pointer;
  }
  .check-circle.done { background: var(--success); border-color: var(--success); color: white; }
  .check-circle.absent { background: var(--danger); border-color: var(--danger); color: white; }
</style>
</head>
